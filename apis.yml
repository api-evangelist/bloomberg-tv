apis:
- aid: bloomberg-tv:bloomberg-tv-api
  name: Bloomberg TV Content API
  description: Access Bloomberg TV video content, live stream, and on-demand clips
    for licensed distribution. Provides access to market coverage segments, interviews,
    and editorial content for enterprise and media partner integration.
  humanURL: https://www.bloomberg.com/live/
  baseURL: https://api.bloomberg.com/tv
  tags:
  - TV Content
