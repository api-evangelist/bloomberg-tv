aid: bloomberg-tv
name: Bloomberg TV
description: Bloomberg TV is a 24-hour global business and financial news television
  network delivering real-time market coverage, business news, executive interviews,
  and economic analysis. Bloomberg TV reaches a global audience through cable, satellite,
  digital streaming, and over-the-top (OTT) platforms. The network provides live
  market open and close coverage, special event programming, and on-demand content
  access.
