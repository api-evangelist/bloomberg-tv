    url: https://www.bloomberg.com/live/
- aid: bloomberg-tv:bloomberg-tv-embed
  name: Bloomberg TV Embed API
  description: Embed Bloomberg TV live stream and video clips on licensed digital
    properties using Bloomberg's embed API. Supports customizable player integration
    for websites, apps, and digital publishing platforms.
  humanURL: https://www.bloomberg.com/live/
  baseURL: https://embed.bloomberg.com/tv
